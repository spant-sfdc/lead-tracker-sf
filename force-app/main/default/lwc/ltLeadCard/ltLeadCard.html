<template>
    <article class={cardClass}
             draggable="true"
             tabindex="0"
             role="article"
             aria-label={cardAriaLabel}
             ondragstart={handleDragStart}
             ondragend={handleDragEnd}
             onclick={handleCardClick}
             onkeydown={handleKeyDown}>

        <template lwc:if={card.isStale}>
            <div class="lc-stale-ribbon">Stale</div>
        </template>

        <!-- Header: company + action button -->
        <div class="lc-header">
            <div class="lc-company-block">
                <span class="lc-company" title={card.company}>{card.company}</span>
                <span class="lc-name" title={card.name}>{card.name}</span>
            </div>
            <button class="lc-action-btn"
                    type="button"
                    title="Actions"
                    aria-label="Lead actions"
                    aria-expanded={showActions}
                    aria-haspopup="menu"
                    onclick={handleActionToggle}>
                <lightning-icon icon-name="utility:overflow" size="x-small" alternative-text="Actions"></lightning-icon>
            </button>
        </div>

        <!-- Health + Stage pills -->
        <div class="lc-pills">
            <template lwc:if={card.leadHealth}>
                <span class={healthClass}>{card.leadHealth}</span>
            </template>
            <template lwc:if={currentStageLabel}>
                <span class="lc-pill lc-pill--stage">{currentStageLabel}</span>
            </template>
        </div>

        <!-- Meta grid -->
        <dl class="lc-meta">
            <template lwc:if={card.lastActivityDate}>
                <div class="lc-meta-row">
                    <dt>Last Activity</dt>
                    <dd>{formattedLastActivity}</dd>
                </div>
            </template>
            <template lwc:if={card.nextFollowUp}>
                <div class="lc-meta-row">
                    <dt>Follow Up</dt>
                    <dd class={followUpClass}>{formattedNextFollowUp}</dd>
                </div>
            </template>
            <template lwc:if={card.fundingModel}>
                <div class="lc-meta-row">
                    <dt>Funding</dt>
                    <dd>{card.fundingModel}</dd>
                </div>
            </template>
            <template lwc:if={card.primaryStakeholder}>
                <div class="lc-meta-row">
                    <dt>Stakeholder</dt>
                    <dd>{card.primaryStakeholder}</dd>
                </div>
            </template>
        </dl>

        <!-- Engagement score bar -->
        <template lwc:if={hasScore}>
            <div class="lc-score-row">
                <span class="lc-score-label">Score</span>
                <div class="lc-score-track">
                    <div class="lc-score-fill" style={scoreFillStyle}></div>
                </div>
                <span class="lc-score-val">{card.engagementScore}</span>
            </div>
        </template>

        <!-- Badges -->
        <template lwc:if={hasBadges}>
            <div class="lc-badges">
                <template for:each={card.badges} for:item="badge">
                    <span key={badge} class="lc-badge">{badge}</span>
                </template>
            </div>
        </template>

        <!-- Quick actions popover -->
        <template lwc:if={showActions}>
            <c-lt-quick-actions
                card={card}
                stage-options={stageOptions}
                onquickaction={handleQuickAction}>
            </c-lt-quick-actions>
        </template>
    </article>
</template>
